name: Build and deploy Jekyll site

on:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Checkout events repo
        uses: actions/checkout@v4
        with:
          repository: sysilviakim/SNU-student-events
          path: external-events

      - name: Copy event data
        run: |
          if [ -f external-events/events.yml ]; then
            mkdir -p _data
            cp external-events/events.yml _data/events.yml
          else
            echo "external-events/events.yml not found; using website fallback data."
          fi

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build --future

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
